<div class="page-content space-top p-b50">
  <div class="container">
    <div class="chat-box-area">

      <div class="chat-header-user" *ngIf="receiverProfile">
        <img
          [src]="receiverProfile.photos?.[0] || receiverProfile.avatar || '../assets/images/user/pic1.jpg'"
          alt="avatar">

        <div>
          <h6>{{ receiverProfile.name || receiverProfile.venueName || receiverProfile.username || 'Usuario' }}</h6>
          <small>En línea</small>
        </div>
      </div>

      <div
        *ngFor="let msg of messages"
        class="chat-row"
        [class.me]="msg.sender === currentUserId"
        [class.other]="msg.sender !== currentUserId">

        <div class="message-wrapper">
          <small class="sender-name">
            {{ msg.sender === currentUserId ? 'Tú' : (receiverProfile?.name || receiverProfile?.venueName || 'Usuario') }}
          </small>

          <div class="bubble">
            {{ msg.text }}
          </div>

          <div class="message-time">

  <span *ngIf="msg.sender === currentUserId && msg.read" class="seen">
    · Visto
  </span>
</div>
        </div>
      </div>

      <div #scrollBottom></div>
    </div>
  </div>
</div>
<div class="chat-quick-actions" *ngIf="isMatched">

  <button type="button" *ngIf="insideSameLocal">
    🍸 Enviar copa
  </button>

  <button type="button" *ngIf="insideSameLocal">
    Enviar regalo
  </button>

  <button type="button">
    Ver distancia
  </button>
</div>
<div class="chat-locked" *ngIf="!isMatched">
  🔒 El chat se desbloquea cuando ambos hacen match.
</div>
<footer class="chat-input-footer">
  <form [formGroup]="form" (ngSubmit)="send()" class="chat-form">
    <input
      type="text"
      placeholder="Escribe un mensaje"
      formControlName="message">

    <button type="submit">
      <i class="icon feather icon-send"></i>
    </button>
  </form>
</footer>
